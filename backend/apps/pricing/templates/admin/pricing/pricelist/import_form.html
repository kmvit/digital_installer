{% extends "admin/base_site.html" %}

{% block breadcrumbs %}
<div class="breadcrumbs">
  <a href="{% url 'admin:index' %}">Главная</a>
  &rsaquo; <a href="{% url 'admin:app_list' app_label=opts.app_label %}">{{ opts.app_config.verbose_name }}</a>
  &rsaquo; <a href="{% url 'admin:pricing_pricelist_changelist' %}">{{ opts.verbose_name_plural|capfirst }}</a>
  &rsaquo; Импорт из Excel
</div>
{% endblock %}

{% block content %}
  <h1>Импорт расценок из Excel</h1>

  <form method="post" enctype="multipart/form-data" novalidate>
    {% csrf_token %}
    {{ form.as_p }}
    <div class="submit-row">
      <input type="submit" value="Импортировать" class="default">
      <a href="{% url 'admin:pricing_pricelist_changelist' %}" class="button cancel-link">Отмена</a>
    </div>
  </form>
{% endblock %}
